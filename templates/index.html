{% import "image.html" as image %}

{% extends "base.html" %}

{% block title %}Light-Booru{% endblock %}

{% block head %}
{% endblock %}

{% block content %}
<main class="flex-1">
    <div id="image-viewer"></div>
    <div id="image-gallery" class="images">
        {% call image::imageList(images, search, page_size, 1) %}
    </div>
    <script>
        function updateImages() {
            let imgs = document.querySelectorAll(".images img");
            imgs.forEach(img => img.addEventListener("load", () => {
                img.parentElement.style.setProperty("--r", (img.clientWidth/img.clientHeight).toString());
            }));
        }
        document.addEventListener("htmx:afterSwap", updateImages);
        updateImages();
    </script>
</main>
{% endblock %}
